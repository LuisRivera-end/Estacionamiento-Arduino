<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100" role="img" aria-labelledby="title desc">
  <title id="title">Circuito Arduino UNO Salida</title>
  <desc id="desc">Diagrama de cableado para la caseta de salida con Arduino UNO, ESP8266, LCD I2C, sensor IR, teclado 4x4, LEDs, buzzer y servo.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #122033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #44546a; }
      .box { fill: #f8fbff; stroke: #25364d; stroke-width: 2; rx: 18; }
      .board { fill: #dff0ff; stroke: #0c5a9c; stroke-width: 3; rx: 18; }
      .bread { fill: #fff7df; stroke: #9b6b00; stroke-width: 3; rx: 18; }
      .module { fill: #f8fbff; stroke: #25364d; stroke-width: 2.5; rx: 16; }
      .moduleGreen { fill: #e9f8ed; stroke: #1f7a3b; stroke-width: 2.5; rx: 16; }
      .moduleRed { fill: #fff1f2; stroke: #b91c1c; stroke-width: 2.5; rx: 16; }
      .moduleOrange { fill: #fff1dd; stroke: #b65f00; stroke-width: 2.5; rx: 16; }
      .modulePurple { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 2.5; rx: 16; }
      .pin { fill: #ffffff; stroke: #24384f; stroke-width: 1.5; rx: 5; }
      .pinText { font: 700 14px Arial, sans-serif; fill: #122033; }
      .label { font: 700 18px Arial, sans-serif; fill: #122033; }
      .small { font: 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 12px Arial, sans-serif; fill: #475569; }
      .note { font: 15px Arial, sans-serif; fill: #1f2937; }
      .wire { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .serial { stroke: #2563eb; color: #2563eb; }
      .signal { stroke: #16a34a; color: #16a34a; }
      .i2c { stroke: #7c3aed; color: #7c3aed; }
      .power5 { stroke: #dc2626; color: #dc2626; }
      .power33 { stroke: #f97316; color: #f97316; }
      .ground { stroke: #111827; color: #111827; }
      .servo { stroke: #ca8a04; color: #ca8a04; }
      .keypad { stroke: #0891b2; color: #0891b2; }
      .alert { stroke: #b91c1c; color: #b91c1c; }
      .ok { stroke: #15803d; color: #15803d; }
      .rail5 { stroke: #dc2626; stroke-width: 8; stroke-linecap: round; }
      .rail33 { stroke: #f97316; stroke-width: 8; stroke-linecap: round; }
      .railg { stroke: #111827; stroke-width: 8; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1700" height="1100" fill="#ffffff" />
  <text x="60" y="55" class="title">Caseta de salida - Arduino UNO + protoboard</text>
  <text x="60" y="84" class="subtitle">Referencia de armado: validacion de ticket por teclado, LCD I2C, LEDs, buzzer, sensor IR, servo y ESP8266.</text>

  <g id="arduino">
    <rect x="60" y="135" width="520" height="820" class="board" />
    <text x="92" y="180" class="label">Arduino UNO Salida</text>
    <text x="92" y="208" class="small">0/RX y 1/TX reservados para USB serial</text>

    <rect x="90" y="240" width="125" height="30" class="pin" /><text x="105" y="261" class="pinText">2 ESP TX</text>
    <rect x="90" y="278" width="125" height="30" class="pin" /><text x="105" y="299" class="pinText">3 ESP RX</text>
    <rect x="90" y="316" width="125" height="30" class="pin" /><text x="105" y="337" class="pinText">4 IR OUT</text>
    <rect x="90" y="354" width="125" height="30" class="pin" /><text x="105" y="375" class="pinText">5 SERVO</text>
    <rect x="90" y="392" width="125" height="30" class="pin" /><text x="105" y="413" class="pinText">6 BUZZER</text>
    <rect x="90" y="430" width="125" height="30" class="pin" /><text x="105" y="451" class="pinText">7 LED ROJO</text>
    <rect x="90" y="468" width="125" height="30" class="pin" /><text x="105" y="489" class="pinText">8 LED VERDE</text>
    <rect x="90" y="520" width="125" height="30" class="pin" /><text x="105" y="541" class="pinText">9 R1</text>
    <rect x="90" y="558" width="125" height="30" class="pin" /><text x="105" y="579" class="pinText">10 R2</text>
    <rect x="90" y="596" width="125" height="30" class="pin" /><text x="105" y="617" class="pinText">11 R3</text>
    <rect x="90" y="634" width="125" height="30" class="pin" /><text x="105" y="655" class="pinText">12 R4</text>
    <rect x="90" y="672" width="125" height="30" class="pin" /><text x="105" y="693" class="pinText">13 C1</text>
    <rect x="90" y="710" width="125" height="30" class="pin" /><text x="105" y="731" class="pinText">A0 C2</text>
    <rect x="90" y="748" width="125" height="30" class="pin" /><text x="105" y="769" class="pinText">A1 C3</text>
    <rect x="90" y="786" width="125" height="30" class="pin" /><text x="105" y="807" class="pinText">A2 C4</text>
    <rect x="90" y="840" width="125" height="30" class="pin" /><text x="105" y="861" class="pinText">A4 SDA</text>
    <rect x="90" y="878" width="125" height="30" class="pin" /><text x="105" y="899" class="pinText">A5 SCL</text>

    <text x="305" y="262" class="tiny">ESP8266 por SoftwareSerial</text>
    <text x="305" y="337" class="tiny">Sensor IR de presencia</text>
    <text x="305" y="374" class="tiny">Servo barrera salida</text>
    <text x="305" y="414" class="tiny">Alerta sonora</text>
    <text x="305" y="452" class="tiny">Bloqueado / pago pendiente</text>
    <text x="305" y="489" class="tiny">Salida autorizada</text>
    <text x="305" y="618" class="tiny">R1-R4 y C1-C4 del teclado 4x4</text>
    <text x="305" y="862" class="tiny">LCD I2C</text>
  </g>

  <g id="breadboard">
    <rect x="650" y="135" width="320" height="820" class="bread" />
    <text x="685" y="178" class="label">Protoboard salida</text>
    <line x1="690" y1="225" x2="930" y2="225" class="rail5" />
    <line x1="690" y1="265" x2="930" y2="265" class="railg" />
    <line x1="690" y1="305" x2="930" y2="305" class="rail33" />
    <text x="715" y="217" class="pinText" fill="#dc2626">Riel 5V externo</text>
    <text x="715" y="257" class="pinText" fill="#111827">Riel GND comun</text>
    <text x="715" y="297" class="pinText" fill="#f97316">Riel 3.3V regulado</text>

    <rect x="690" y="360" width="240" height="62" class="moduleOrange" />
    <text x="710" y="385" class="pinText">Divisor / level shifter</text>
    <text x="710" y="406" class="tiny">Arduino TX 5V -> ESP RX 3.3V</text>

    <rect x="705" y="470" width="210" height="72" class="moduleRed" />
    <text x="735" y="500" class="pinText">LED rojo + 220 ohm</text>
    <text x="752" y="523" class="tiny">Pin 7 a GND</text>

    <rect x="705" y="565" width="210" height="72" class="moduleGreen" />
    <text x="730" y="595" class="pinText">LED verde + 220 ohm</text>
    <text x="752" y="618" class="tiny">Pin 8 a GND</text>

    <rect x="705" y="662" width="210" height="72" class="module" />
    <text x="745" y="692" class="pinText">Buzzer activo</text>
    <text x="752" y="715" class="tiny">Pin 6 a GND</text>

    <rect x="690" y="780" width="240" height="100" class="moduleOrange" />
    <text x="710" y="812" class="pinText">Fuente externa</text>
    <text x="710" y="836" class="tiny">5V para servo y LCD</text>
    <text x="710" y="860" class="tiny">3.3V estable para ESP8266</text>
  </g>

  <g id="modules">
    <rect x="1090" y="115" width="430" height="150" class="moduleOrange" />
    <text x="1120" y="153" class="label">ESP8266 ESP-01</text>
    <text x="1120" y="181" class="small">HTTP REST hacia FastAPI</text>
    <text x="1120" y="207" class="tiny">TX-&gt;2, RX&lt;-3 protegido, VCC/EN=3.3V</text>

    <rect x="1090" y="305" width="430" height="115" class="module" />
    <text x="1120" y="343" class="label">LCD 16x2 I2C</text>
    <text x="1120" y="372" class="small">Pedir codigo / pago pendiente / autorizado</text>
    <text x="1120" y="398" class="tiny">SDA=A4, SCL=A5</text>

    <rect x="1090" y="455" width="430" height="115" class="moduleGreen" />
    <text x="1120" y="493" class="label">Sensor IR salida</text>
    <text x="1120" y="522" class="small">Detecta vehiculo antes de pedir ticket</text>
    <text x="1120" y="548" class="tiny">OUT=4, VCC=5V, GND</text>

    <rect x="1090" y="610" width="430" height="150" class="modulePurple" />
    <text x="1120" y="648" class="label">Teclado matricial 4x4</text>
    <text x="1120" y="676" class="small">Captura codigo A-Z/0-9 segun teclas disponibles</text>
    <text x="1120" y="704" class="tiny">R1-R4=9-12, C1=13, C2=A0, C3=A1, C4=A2</text>
    <text x="1120" y="730" class="tiny">Usar * para borrar y # para confirmar si se configura asi</text>

    <rect x="1090" y="805" width="430" height="125" class="module" />
    <text x="1120" y="843" class="label">Servo barrera salida</text>
    <text x="1120" y="872" class="small">Se abre solo con `authorized=true`</text>
    <text x="1120" y="898" class="tiny">SIG=5, VCC=5V externo, GND comun</text>
  </g>

  <!-- Serial ESP8266 -->
  <path d="M215 255 C515 255, 840 150, 1090 150" class="wire serial" />
  <text x="575" y="198" class="tiny" fill="#2563eb">Pin 2 &lt;- ESP TX</text>
  <path d="M215 293 C430 305, 565 391, 690 391" class="wire serial" />
  <path d="M930 391 C1010 380, 1040 207, 1090 207" class="wire serial" />
  <text x="560" y="344" class="tiny" fill="#2563eb">Pin 3 -> divisor -> ESP RX</text>

  <!-- IR, servo, buzzer, leds -->
  <path d="M215 331 C545 360, 920 492, 1090 492" class="wire signal" />
  <text x="565" y="465" class="tiny" fill="#16a34a">Pin 4 senal IR</text>
  <path d="M215 369 C500 485, 850 840, 1090 840" class="wire servo" />
  <text x="570" y="760" class="tiny" fill="#ca8a04">Pin 5 senal servo</text>
  <path d="M215 407 C420 470, 560 695, 705 695" class="wire alert" />
  <path d="M215 445 C430 465, 590 505, 705 505" class="wire alert" />
  <path d="M215 483 C430 520, 590 600, 705 600" class="wire ok" />

  <!-- Keypad ribbon -->
  <path d="M215 535 C545 560, 900 635, 1090 635" class="wire keypad" />
  <path d="M215 573 C545 590, 900 650, 1090 650" class="wire keypad" />
  <path d="M215 611 C545 620, 900 665, 1090 665" class="wire keypad" />
  <path d="M215 649 C545 650, 900 680, 1090 680" class="wire keypad" />
  <path d="M215 687 C545 690, 900 695, 1090 695" class="wire keypad" />
  <path d="M215 725 C545 720, 900 710, 1090 710" class="wire keypad" />
  <path d="M215 763 C545 750, 900 725, 1090 725" class="wire keypad" />
  <path d="M215 801 C545 780, 900 740, 1090 740" class="wire keypad" />
  <text x="510" y="612" class="tiny" fill="#0891b2">8 hilos teclado 4x4</text>

  <!-- I2C -->
  <path d="M215 855 C520 855, 870 343, 1090 343" class="wire i2c" />
  <path d="M215 893 C520 893, 870 372, 1090 372" class="wire i2c" />
  <text x="570" y="860" class="tiny" fill="#7c3aed">A4/A5 bus I2C</text>

  <!-- Power rails -->
  <path d="M215 912 C405 940, 515 225, 690 225" class="wire power5" />
  <path d="M215 932 C405 960, 515 265, 690 265" class="wire ground" />
  <path d="M930 305 C1010 305, 1030 207, 1090 207" class="wire power33" />
  <path d="M930 265 C1010 265, 1030 230, 1090 230" class="wire ground" />
  <path d="M930 225 C1010 250, 1035 398, 1090 398" class="wire power5" />
  <path d="M930 265 C1010 280, 1035 416, 1090 416" class="wire ground" />
  <path d="M930 225 C1010 360, 1035 548, 1090 548" class="wire power5" />
  <path d="M930 265 C1010 395, 1035 565, 1090 565" class="wire ground" />
  <path d="M930 225 C1010 520, 1035 872, 1090 872" class="wire power5" />
  <path d="M930 265 C1010 550, 1035 898, 1090 898" class="wire ground" />

  <g id="legend">
    <rect x="60" y="990" width="1460" height="75" class="box" />
    <text x="90" y="1024" class="label">Notas de armado</text>
    <text x="90" y="1052" class="note">1. LCD I2C libera pines para el teclado. 2. El pin 13 se usa como C1 del teclado. 3. LEDs siempre con resistencia. 4. Servo y ESP8266 requieren alimentacion estable y GND comun.</text>
  </g>
</svg>
