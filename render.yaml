services:
  - type: web
    name: parking-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: python -m app.db.migrate && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: BOOTSTRAP_FIRST_USER_AS_ADMIN
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: API_DEVICE_TOKEN_ENTRY
        sync: false
      - key: API_DEVICE_TOKEN_EXIT
        sync: false

  - type: web
    name: parking-web
    runtime: node
    plan: free
    rootDir: parking-web
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
