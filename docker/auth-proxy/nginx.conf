# =============================================================================
# Proxy de autenticación (modo Docker LOCAL)
# =============================================================================
# El frontend usa supabase-js apuntando a NEXT_PUBLIC_SUPABASE_URL = http://<LAN_HOST>:9999
# y supabase-js antepone el prefijo "/auth/v1" a todas sus llamadas
# (/auth/v1/token, /auth/v1/signup, /auth/v1/user, ...).
#
# GoTrue, en cambio, expone sus rutas SIN ese prefijo (/token, /signup, /user...).
# Este nginx hace de "Kong simplificado": recibe /auth/v1/* y lo reenvía a GoTrue
# quitando el prefijo, y además resuelve el CORS (GoTrue standalone no emite los
# headers Access-Control-* por sí mismo).
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 80;
        server_name _;

        # Healthcheck simple del proxy.
        location = /health {
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # /auth/v1/<x>  ->  http://gotrue:9999/<x>
        location /auth/v1/ {
            # ----------------------------------------------------------------
            # CORS. El navegador puede abrir el panel desde un host/origen
            # distinto al de GoTrue (p.ej. localhost:4000 -> host:9999), así que
            # reflejamos el Origin de la petición y permitimos credenciales.
            # ----------------------------------------------------------------
            # Preflight: responder aquí mismo, sin tocar a GoTrue.
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $http_origin always;
                add_header Access-Control-Allow-Credentials true        always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, apikey, X-Client-Info, X-Supabase-Api-Version, Accept, Prefer, Range" always;
                add_header Access-Control-Max-Age           3600 always;
                add_header Content-Type   text/plain;
                add_header Content-Length 0;
                return 204;
            }

            # Evita headers CORS duplicados si alguna versión de GoTrue los emite.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials true        always;

            # El "/" final en proxy_pass elimina el prefijo /auth/v1/.
            proxy_pass http://gotrue:9999/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
