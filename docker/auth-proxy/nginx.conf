# =============================================================================
# Proxy de autenticación (modo Docker LOCAL)
# =============================================================================
# El frontend usa supabase-js apuntando a NEXT_PUBLIC_SUPABASE_URL = http://<LAN_HOST>:9999
# y supabase-js antepone el prefijo "/auth/v1" a todas sus llamadas
# (/auth/v1/token, /auth/v1/signup, /auth/v1/user, ...).
#
# GoTrue, en cambio, expone sus rutas SIN ese prefijo (/token, /signup, /user...).
# Este nginx hace de "Kong simplificado": recibe /auth/v1/* y lo reenvía a GoTrue
# quitando el prefijo. Así NO hay que tocar el código de auth del frontend, solo
# la variable de entorno.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 80;
        server_name _;

        # Healthcheck simple del proxy.
        location = /health {
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # /auth/v1/<x>  ->  http://gotrue:9999/<x>
        # El "/" final en proxy_pass elimina el prefijo /auth/v1/.
        location /auth/v1/ {
            proxy_pass http://gotrue:9999/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ----------------------------------------------------------------
            # CORS de respaldo (R2): GoTrue normalmente responde el preflight
            # por su cuenta. Si en pruebas el navegador reporta errores CORS
            # desde http://<LAN_HOST>:4000, descomenta este bloque. NO lo dejes
            # activo a la vez que GoTrue emite sus propios headers (se duplican).
            # ----------------------------------------------------------------
            # if ($request_method = OPTIONS) {
            #     add_header Access-Control-Allow-Origin  $http_origin always;
            #     add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            #     add_header Access-Control-Allow-Headers 'Authorization, Content-Type, apikey, X-Client-Info' always;
            #     add_header Access-Control-Allow-Credentials 'true' always;
            #     add_header Content-Length 0;
            #     return 204;
            # }
        }
    }
}
